; PHP 開發環境配置

; 錯誤報告
display_errors = On
display_startup_errors = On
error_reporting = E_ALL
log_errors = On
error_log = /var/log/php_errors.log

; 調試設置
html_errors = On

; 性能設置（開發用）
memory_limit = 512M
max_execution_time = 300
max_input_time = 300
max_input_vars = 5000

; 上傳設置
upload_max_filesize = 64M
post_max_size = 64M

; 時區設置
date.timezone = Asia/Taipei
